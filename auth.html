<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriBotGH — Sign Up / Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;min-height:100vh;background:linear-gradient(135deg,#1B5E20 0%,#2E7D32 50%,#388E3C 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:20px;padding:36px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.logo{text-align:center;margin-bottom:24px}
.logo-icon{font-size:46px}
.logo h1{font-size:25px;font-weight:700;color:#1B5E20;margin:6px 0 2px}
.logo p{font-size:12px;color:#757575}
.tabs{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid #2E7D32;margin-bottom:24px}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;background:white;color:#2E7D32;border:none}
.tab.active{background:#2E7D32;color:white}
.step{display:none}
.step.active{display:block}
.section-title{font-size:16px;font-weight:700;color:#1B5E20;margin-bottom:14px}
label{display:block;font-size:13px;font-weight:600;color:#424242;margin-bottom:5px}
input{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;margin-bottom:12px;outline:none}
input:focus{border-color:#2E7D32}
.btn{width:100%;padding:13px;border-radius:10px;border:none;background:#2E7D32;color:white;font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:2px}
.btn:hover{background:#1B5E20}
.btn:disabled{background:#a5d6a7;cursor:not-allowed}
.btn-outline{background:white;color:#2E7D32;border:2px solid #2E7D32;margin-top:8px}
.btn-outline:hover{background:#E8F5E9}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:#bbb;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e0e0}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border:1.5px solid #e0e0e0;border-radius:10px;background:white;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:600;font-size:14px;color:#424242}
.google-btn:hover{background:#f5f5f5}
.otp-grid{display:flex;gap:8px;margin-bottom:12px;justify-content:center}
.otp-box{width:46px;height:54px;text-align:center;font-size:22px;font-weight:700;padding:0;margin:0;border-radius:10px}
.timer{text-align:center;font-size:13px;color:#e53935;font-weight:600;margin-bottom:10px}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.msg.error{background:#FFEBEE;color:#c62828;border-left:3px solid #e53935}
.msg.success{background:#E8F5E9;color:#1B5E20;border-left:3px solid #2E7D32}
.msg.show{display:block}
.dev-note{background:#FFF8E1;border:1px solid #FFD54F;border-radius:8px;padding:10px 14px;font-size:12px;color:#5D4037;margin-bottom:14px;display:none}
.dev-note.show{display:block}
.bottom-link{text-align:center;font-size:13px;color:#757575;margin-top:16px}
.bottom-link a{color:#2E7D32;font-weight:600;text-decoration:none;cursor:pointer}
.strength-bar{height:4px;border-radius:2px;background:#e0e0e0;margin:-6px 0 12px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:all .3s;width:0%}
.hint{font-size:11px;color:#9E9E9E;margin:-6px 0 12px}
@media(max-width:480px){.card{padding:26px 18px}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <h1>AgriBotGH</h1>
    <p>Bilingual Agricultural Chatbot</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('signup')">Sign Up</button>
    <button class="tab" onclick="switchTab('login')">Log In</button>
  </div>

  <div id="msg" class="msg"></div>
  <div id="devNote" class="dev-note"></div>

  <!-- SIGNUP STEP 1: Email + Name -->
  <div id="step-1" class="step active">
    <div class="section-title">Create your account</div>
    <label>Your Name</label>
    <input type="text" id="suUsername" placeholder="e.g. Kofi">
    <label>Email Address</label>
    <input type="email" id="suEmail" placeholder="yourname@example.com">
    <button class="btn" onclick="doSendOtp()">Send Verification Code</button>

    <div class="divider">OR</div>
    <div id="googleBtnSignup"></div>
    <button class="btn btn-outline" onclick="startPhoneSignup()">📱 Sign up with Phone Number</button>
  </div>

  <!-- SIGNUP STEP 2: OTP -->
  <div id="step-2" class="step">
    <div class="section-title">Verify your email</div>
    <p style="font-size:13px;color:#757575;margin-bottom:16px" id="otpSubtitle"></p>
    <div class="otp-grid">
      <input class="otp-box" maxlength="1" oninput="otpInput(this,0)" onkeydown="otpBack(event,0)">
      <input class="otp-box" maxlength="1" oninput="otpInput(this,1)" onkeydown="otpBack(event,1)">
      <input class="otp-box" maxlength="1" oninput="otpInput(this,2)" onkeydown="otpBack(event,2)">
      <input class="otp-box" maxlength="1" oninput="otpInput(this,3)" onkeydown="otpBack(event,3)">
      <input class="otp-box" maxlength="1" oninput="otpInput(this,4)" onkeydown="otpBack(event,4)">
      <input class="otp-box" maxlength="1" oninput="otpInput(this,5)" onkeydown="otpBack(event,5)">
    </div>
    <div class="timer" id="otpTimer">⏱ 60 seconds remaining</div>
    <button class="btn" onclick="doVerifyOtp()">Verify Code</button>
    <button class="btn btn-outline" id="resendBtn" onclick="doResend()" disabled>Resend Code</button>
    <button class="btn btn-outline" onclick="goToStep(1)" style="margin-top:6px">← Go Back</button>
  </div>

  <!-- SIGNUP STEP 3: Password -->
  <div id="step-3" class="step">
    <div class="section-title">Create your password</div>
    <label>Password</label>
    <input type="password" id="suPassword" placeholder="Min 8 characters" oninput="checkStrength(this.value)">
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="hint">Must include letters, numbers and a symbol (e.g. @ # !)</div>
    <label>Confirm Password</label>
    <input type="password" id="suPassword2" placeholder="Re-enter password">
    <button class="btn" onclick="doSetPassword()">Create Account</button>
  </div>

  <!-- LOGIN -->
  <div id="step-login" class="step">
    <div class="section-title">Welcome back 👋</div>
    <label>Email Address</label>
    <input type="email" id="liEmail" placeholder="yourname@example.com">
    <label>Password</label>
    <input type="password" id="liPassword" placeholder="Your password">
    <button class="btn" onclick="doLogin()">Log In</button>
    <div class="divider">OR</div>
    <div id="googleBtnLogin"></div>
    <div class="bottom-link">No account? <a onclick="switchTab('signup')">Sign Up</a></div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:5000';
let otpInterval=null, otpSeconds=60, currentEmail='', currentUsername='';
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0)===(tab==='signup')));
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById(tab==='signup'?'step-1':'step-login').classList.add('active');
  clearMsg();
}
function goToStep(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step-'+n).classList.add('active');
  clearMsg();
  if(n!==2) clearInterval(otpInterval);
}
function showMsg(t,type='error'){const e=document.getElementById('msg');e.textContent=t;e.className=`msg ${type} show`;}
function clearMsg(){document.getElementById('msg').className='msg';document.getElementById('devNote').className='dev-note';}

function checkStrength(pw){
  const fill=document.getElementById('strengthFill');
  let score=0;
  if(pw.length>=8)score++;
  if(/[A-Za-z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const colors=['#e53935','#FF9800','#FDD835','#2E7D32'];
  fill.style.width=(score*25)+'%';
  fill.style.background=colors[score-1]||'#e0e0e0';
}

async function doSendOtp(){
  clearMsg();
  const username=document.getElementById('suUsername').value.trim();
  const email=document.getElementById('suEmail').value.trim();
  if(!username||!email) return showMsg('Please fill in all fields.');
  const btn=document.querySelector('#step-1 .btn');
  btn.disabled=true; btn.textContent='Sending...';
  try{
    const res=await fetch(`${API}/api/auth/send-otp`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,username})});
    const data=await res.json();
    if(!res.ok) return showMsg(data.error||'Failed to send code');
    currentEmail=email; currentUsername=username;
    document.getElementById('otpSubtitle').textContent=`We sent a 6-digit code to ${email}. Enter it below.`;
    if(data.dev_otp){const dn=document.getElementById('devNote');dn.textContent=`🔧 Dev Mode — OTP: ${data.dev_otp}`;dn.className='dev-note show';}
    goToStep(2);
    startTimer();
    document.querySelectorAll('.otp-box')[0].focus();
  }catch(e){showMsg('Network error. Is the server running?');}
  finally{btn.disabled=false;btn.textContent='Send Verification Code';}
}

function otpInput(el,idx){
  el.value=el.value.replace(/\D/g,'');
  if(el.value&&idx<5)document.querySelectorAll('.otp-box')[idx+1].focus();
  if(idx===5&&el.value)doVerifyOtp();
}
function otpBack(e,idx){if(e.key==='Backspace'&&!e.target.value&&idx>0)document.querySelectorAll('.otp-box')[idx-1].focus();}
function getOtp(){return [...document.querySelectorAll('.otp-box')].map(b=>b.value).join('');}

function startTimer(){
  otpSeconds=60;
  const t=document.getElementById('otpTimer'), r=document.getElementById('resendBtn');
  r.disabled=true; clearInterval(otpInterval);
  otpInterval=setInterval(()=>{
    otpSeconds--;
    t.textContent=otpSeconds>0?`⏱ ${otpSeconds} seconds remaining`:'⌛ Code expired. Click Resend.';
    if(otpSeconds<=0){clearInterval(otpInterval); r.disabled=false;}
  },1000);
}

async function doVerifyOtp(){
  const code=getOtp();
  if(code.length<6) return showMsg('Please enter the full 6-digit code.');
  clearMsg();
  try{
    const res=await fetch(`${API}/api/auth/verify-otp`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:currentEmail,code})});
    const data=await res.json();
    if(!res.ok){showMsg(data.error||'Verification failed'); if(data.locked)document.getElementById('resendBtn').disabled=true; return;}
    clearInterval(otpInterval);
    showMsg('✅ '+data.message,'success');
    setTimeout(()=>goToStep(3),900);
  }catch(e){showMsg('Network error.');}
}

async function doResend(){
  clearMsg();
  document.querySelectorAll('.otp-box').forEach(b=>b.value='');
  try{
    const res=await fetch(`${API}/api/auth/resend-otp`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:currentEmail})});
    const data=await res.json();
    if(!res.ok) return showMsg(data.error||'Failed to resend');
    showMsg('New code sent!','success');
    if(data.dev_otp){const dn=document.getElementById('devNote');dn.textContent=`🔧 Dev Mode — New OTP: ${data.dev_otp}`;dn.className='dev-note show';}
    startTimer();
  }catch(e){showMsg('Network error.');}
}

async function doSetPassword(){
  clearMsg();
  const pw=document.getElementById('suPassword').value.trim();
  const pw2=document.getElementById('suPassword2').value.trim();
  if(pw!==pw2) return showMsg('Passwords do not match.');
  try{
    const res=await fetch(`${API}/api/auth/set-password`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:currentEmail,password:pw})});
    const data=await res.json();
    if(!res.ok) return showMsg(data.error||'Failed to set password');
    showMsg('✅ '+data.message,'success');
    setTimeout(()=>{window.location.href='/app';},1200);
  }catch(e){showMsg('Network error.');}
}

async function doLogin(){
  clearMsg();
  const email=document.getElementById('liEmail').value.trim();
  const password=document.getElementById('liPassword').value.trim();
  if(!email||!password) return showMsg('Please enter your email and password.');
  try{
    const res=await fetch(`${API}/api/auth/login`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(!res.ok) return showMsg(data.error||'Login failed');
    showMsg('✅ '+data.message,'success');
    setTimeout(()=>{window.location.href='/app';},1000);
  }catch(e){showMsg('Network error.');}
}

function startPhoneSignup(){
  showMsg('Phone sign-up is coming soon! Please use email sign-up for now.','error');
}

// ── GOOGLE SIGN-IN ──────────────────────────────────────────────
function handleGoogleResponse(response){
  clearMsg();
  fetch(`${API}/api/auth/google`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({credential:response.credential})})
    .then(r=>r.json().then(data=>({ok:r.ok,data})))
    .then(({ok,data})=>{
      if(!ok) return showMsg(data.error||'Google sign-in failed');
      showMsg('✅ '+data.message,'success');
      setTimeout(()=>{window.location.href='/app';},1000);
    })
    .catch(()=>showMsg('Network error.'));
}

window.onload=function(){
  if(window.google && GOOGLE_CLIENT_ID.indexOf('YOUR_')===-1){
    google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleGoogleResponse});
    google.accounts.id.renderButton(document.getElementById('googleBtnSignup'),{theme:'outline',size:'large',width:'100%',text:'continue_with'});
    google.accounts.id.renderButton(document.getElementById('googleBtnLogin'),{theme:'outline',size:'large',width:'100%',text:'continue_with'});
  } else {
    document.getElementById('googleBtnSignup').innerHTML='<button class="google-btn" onclick="alert(\\'Add your Google Client ID in auth.html to enable this.\\')">🔵 Continue with Google</button>';
    document.getElementById('googleBtnLogin').innerHTML='<button class="google-btn" onclick="alert(\\'Add your Google Client ID in auth.html to enable this.\\')">🔵 Continue with Google</button>';
  }
};
</script>
</body>
</html>
